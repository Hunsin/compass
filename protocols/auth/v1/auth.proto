edition = "2023";

package auth.v1;

import "google/api/annotations.proto";

option go_package = "github.com/Hunsin/compass/protocols/gen/go/auth/v1;auth";

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  int32 expires_in = 2;
  int32 refresh_expires_in = 3;
  string refresh_token = 4;
  string token_type = 5;
  string id_token = 6;
  string session_state = 7;
  string scope = 8;
}

message MeRequest {}

message MeResponse {
  string user_id = 1;
}

service AuthService {
  // Login authenticates a user via Keycloak and returns OAuth2 tokens.
  // This RPC is public (no JWT required).
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/login"
      body: "*"
    };
  }

  // Me returns the authenticated user's information from the JWT token.
  rpc Me(MeRequest) returns (MeResponse) {
    option (google.api.http) = {
      get: "/api/me"
    };
  }
}
