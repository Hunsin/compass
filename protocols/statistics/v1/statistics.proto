edition = "2023";

package statistics.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/Hunsin/compass/protocols/gen/go/statistics/v1;statistics";

// MarginTransaction holds daily margin trading data for a security.
message MarginTransaction {
  google.protobuf.Timestamp date = 1;
  int64 margin_purchase = 2;
  int64 margin_sales = 3;
  int64 cash_redemption = 4;
  int64 margin_balance = 5;
  int64 short_covering = 6;
  int64 short_sale = 7;
  int64 stock_redemption = 8;
  int64 short_balance = 9;
  int64 margin_short_offset = 10;
}

message CreateMarginTransactionsRequest {
  string exchange = 1;
  google.protobuf.Timestamp date = 2;

  // Key is symbol; the date field in MarginTransaction is ignored since it's already provided in the request.
  map<string, MarginTransaction> margin_transactions = 3;
}

message GetMarginTransactionsRequest {
  string exchange = 1;
  string symbol = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp before = 4;
}

service StatisticsService {
  rpc CreateMarginTransactions(CreateMarginTransactionsRequest) returns (google.protobuf.Empty);
  rpc GetMarginTransactions(GetMarginTransactionsRequest) returns (stream MarginTransaction);
}
