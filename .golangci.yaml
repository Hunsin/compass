version: "2"

run:
  go: "1.25"

linters:
  default: none
  enable:
    # Correctness
    - errcheck      # unchecked errors
    - govet         # go vet checks
    - staticcheck   # comprehensive static analysis (SA, S, ST, QF)
    - ineffassign   # ineffectual variable assignments
    - unused        # unused code
    - nilerr        # returning nil after checking for a non-nil error
    - exhaustive    # exhaustive switch/map on enum types

    # Style / maintainability
    - revive        # opinionated linting rules (successor to golint)
    - gocritic      # diagnostic, style, and performance checks
    - misspell      # typos in comments and strings

  exclusions:
    presets:
      - std-error-handling

  settings:
    exhaustive:
      default-signifies-exhaustive: true  # a default: case counts as exhaustive

    revive:
      rules:
        - name: exported
          disabled: true  # don't require doc comments on every exported symbol
        - name: unused-parameter
          disabled: true  # proto-generated server interfaces often have unused params

    gocritic:
      disabled-checks:
        - commentFormatting  # too pedantic about comment style

formatters:
  enable:
    - gofmt
    - goimports
  
  settings:
    goimports:
      local-prefixes:
        - github.com/Hunsin/compass

issues:
  exclude-dirs:
    - postgres/gen    # sqlc-generated code
    - protocols/gen   # buf-generated code
