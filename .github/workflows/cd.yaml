name: CD Pipeline

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: "Push image to GitHub Registry?"
        required: true
        type: boolean
        default: false

env:
  SHOULD_PUSH: ${{ github.event_name == 'push' || github.event.inputs.push_to_registry == 'true' }}

jobs:
  build_and_push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binary via Makefile
        run: make install

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/compass-app
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfiles/app.Dockerfile
          push: ${{ env.SHOULD_PUSH }}
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check if migration files changed
        id: migrate-changes
        run: |
          # Find the previous tag to compare against
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, will build migrate image"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only "$PREV_TAG" HEAD -- postgres/migrations/ dockerfiles/migrate.Dockerfile)
            if [ -n "$CHANGED" ]; then
              echo "Migration files changed since $PREV_TAG:"
              echo "$CHANGED"
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No migration files changed since $PREV_TAG, skipping build"
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Docker metadata (migrate)
        if: steps.migrate-changes.outputs.changed == 'true'
        id: meta-migrate
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/compass-migrate
          tags: |
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push migrate image
        if: steps.migrate-changes.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dockerfiles/migrate.Dockerfile
          push: ${{ env.SHOULD_PUSH }}
          tags: ${{ steps.meta-migrate.outputs.tags }}
          labels: ${{ steps.meta-migrate.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
