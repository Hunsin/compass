x-tools-shared: &tools-shared
  volumes:
    - ${ROOT_DIR:?error}:/compass
  working_dir: /compass
  networks:
    - compass
  profiles:
    - tools

services:
  dev:
    build:
      dockerfile: dockerfiles/dev.Dockerfile
      tags:
        - compass/dev:${GIT_COMMIT_SHA:?error}
    image: compass/dev:${GIT_COMMIT_SHA:?error}
    container_name: compass-dev
    environment:
      - ROOT_DIR=${ROOT_DIR:?error}
    entrypoint: /bin/sh
    volumes:
      - ${ROOT_DIR:?error}:/compass
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /compass
    networks:
      - compass
    tty: true

  migrate:
    <<: *tools-shared
    image: migrate/migrate:v4.19.1
    entrypoint:
      - migrate
      - -path=postgres/migrations
      - -database=${POSTGRES_URL}

  sqlc:
    <<: *tools-shared
    image: sqlc/sqlc:1.30.0
    command: generate
    env_file:
      - .env

  postgres:
    image: postgres:18.2-alpine3.23
    container_name: compass-postgres
    env_file:
      - .env
    healthcheck:
      test: pg_isready
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compass

networks:
  compass:
    name: compass
