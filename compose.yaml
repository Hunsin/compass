services:
  dev:
    build:
      dockerfile: dockerfiles/dev.Dockerfile
      tags:
        - compass/dev:${GIT_COMMIT_SHA}
    image: compass/dev:${GIT_COMMIT_SHA}
    container_name: compass-dev
    entrypoint: /bin/sh
    volumes:
      - .:/compass
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /compass
    networks:
      - compass
    tty: true

  migrate:
    image: migrate/migrate:v4.19.1
    entrypoint:
      - migrate
      - -path=/postgres/migrations
      - -database=${POSTGRES_URL}
    volumes:
      - ./postgres:/postgres
    networks:
      - compass
    profiles:
      - tools

  postgres:
    image: postgres:18.1-alpine3.23
    container_name: compass-postgres
    env_file:
      - .env
    healthcheck:
      test: pg_isready
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - compass

networks:
  compass:
    name: compass
